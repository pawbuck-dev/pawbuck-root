# Recipient claims pet with pre-generated TRF code.
appId: com.pawbuck.app
env:
  MAESTRO_LOGIN_EMAIL: ${MAESTRO_RECIPIENT_EMAIL}
  MAESTRO_LOGIN_PASSWORD: ${MAESTRO_RECIPIENT_PASSWORD}
---
- launchApp:
    clearState: true
- openLink: "Pawbuck://transfer-pet"
- tapOn:
    id: "transfer-code-input"
- inputText: ${MAESTRO_TRANSFER_CODE}
- tapOn:
    id: "verify-transfer-code"
- runFlow: ../subflows/auth-resume-sign-in.yaml
- assertVisible: "Review transfer"
- tapOn:
    id: "accept-transfer-submit"
- assertVisible: "Transfer Complete!"
- tapOn:
    id: "transfer-success-continue"
