# Recipient joins household with pre-generated MTCH code (owner creates code via seed script).
appId: com.pawbuck.app
env:
  MAESTRO_LOGIN_EMAIL: ${MAESTRO_RECIPIENT_EMAIL}
  MAESTRO_LOGIN_PASSWORD: ${MAESTRO_RECIPIENT_PASSWORD}
---
- launchApp:
    clearState: true
- openLink: "Pawbuck://join-household"
- tapOn:
    id: "invite-code-input"
- inputText: ${MAESTRO_HOUSEHOLD_CODE}
- tapOn:
    id: "verify-invite-code"
- runFlow: ../subflows/auth-resume-sign-in.yaml
- tapOn:
    id: "join-household-submit"
- assertVisible: "Successfully Joined!"
- tapOn:
    id: "join-household-success-continue"
