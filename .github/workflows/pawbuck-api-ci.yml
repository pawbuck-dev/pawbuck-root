# PawBuck.API — build + test (.NET 8)
name: PawBuck API CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "backend/**"
      - "packages/milo-journal-trees/**"
      - ".github/workflows/pawbuck-api-ci.yml"

concurrency:
  group: pawbuck-api-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build and test
        run: dotnet test backend/PawBuck.API.Tests/PawBuck.API.Tests.csproj -c Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload API coverage
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: backend/PawBuck.API.Tests/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
