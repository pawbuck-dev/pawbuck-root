# Consumer app: TypeScript + Jest (unit + RTL)
name: Consumer app CI

on:
  # Every merge to main runs CI (avoids missing runs when path filters skip unrelated-looking commits).
  push:
    branches: [main]
  pull_request:
    paths:
      - "apps/consumer-app/**"
      - "packages/pawbuck-api-client/**"
      - "packages/milo-core/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/consumer-app-ci.yml"

concurrency:
  group: consumer-app-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      # pnpm version from root package.json "packageManager" (pinning version here conflicts with packageManager).
      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck consumer app
        run: pnpm --filter pawbuck typecheck

      - name: Test consumer app
        run: pnpm --filter pawbuck run test:ci
