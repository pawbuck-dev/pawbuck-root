# Family sharing & pet transfer — Supabase RPC integration (local stack)
name: Family access integration

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "tools/family-access-integration/**"
      - "supabase/migrations/**"
      - ".github/workflows/family-access-integration.yml"

jobs:
  rpc-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Supabase
        working-directory: supabase
        run: supabase start -x studio,imgproxy,logflare,vector,supavisor

      - name: Load Supabase connection env
        working-directory: supabase
        run: supabase status -o env >> "$GITHUB_ENV"

      - name: Run RPC integration tests
        run: pnpm --filter @pawbuck/family-access-integration test
