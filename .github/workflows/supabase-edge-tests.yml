# Supabase Edge — Deno unit tests (email + health ingestion)
name: Supabase Edge tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "supabase/functions/**"
      - ".github/workflows/supabase-edge-tests.yml"

jobs:
  deno:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Deno tests
        run: |
          deno test \
            supabase/functions/_shared/ \
            supabase/functions/mailgun-process-pet-mail/__tests__/ \
            supabase/functions/process-pet-mail/__tests__/ \
            --allow-read --allow-env
