# Milo eval — live Gemini (nightly + manual)
name: Milo eval nightly

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: milo-eval-nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  milo-eval-live:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # secrets context is not allowed in job-level `if`; gate via step output instead.
      - name: Check eval secrets
        id: gate
        env:
          GEMINI_SECRET_ARN: ${{ secrets.GEMINI_SECRET_ARN }}
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [ -n "$GEMINI_SECRET_ARN" ] && [ -n "$AWS_ROLE_ARN" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::GEMINI_SECRET_ARN / AWS_ROLE_ARN not configured; skipping live eval."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.gate.outputs.run == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: milo-eval-${{ github.run_id }}

      - name: Load Gemini key from Secrets Manager
        if: steps.gate.outputs.run == 'true'
        env:
          GEMINI_SECRET_ARN: ${{ secrets.GEMINI_SECRET_ARN }}
          GEMINI_SECRET_JSON_KEY: ${{ vars.GEMINI_SECRET_JSON_KEY }}
        run: |
          set -euo pipefail
          SECRET="$(aws secretsmanager get-secret-value \
            --secret-id "$GEMINI_SECRET_ARN" \
            --query SecretString \
            --output text)"
          if [ -n "${GEMINI_SECRET_JSON_KEY:-}" ]; then
            KEY="$(echo "$SECRET" | jq -r --arg k "$GEMINI_SECRET_JSON_KEY" '.[$k] // empty')"
          else
            KEY="$SECRET"
          fi
          if [ -z "$KEY" ]; then
            echo "::error::Could not resolve Gemini API key from GEMINI_SECRET_ARN"
            exit 1
          fi
          echo "GOOGLE_GEMINI_API_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deterministic Milo eval
        run: pnpm run milo:eval && pnpm run milo:test

      - name: Live Gemini eval
        env:
          MILO_EVAL_LIVE: "1"
          GEMINI_MODEL: gemini-2.5-flash
        run: dotnet test backend/PawBuck.API.Tests/PawBuck.API.Tests.csproj -c Release --filter "Category=MiloEvalLive" --verbosity normal

      - name: Upload live eval log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milo-eval-live-results
          path: backend/PawBuck.API.Tests/TestResults/**/*
          if-no-files-found: ignore
